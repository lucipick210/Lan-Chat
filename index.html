<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Chat App</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">⚡ LAN CHAT</div>

    <div class="nav-right">
        <span id="userLabel">Utilizator</span>

        <button onclick="logout()">Logout</button>
    </div>
</nav>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Camere</h3>

        <div class="room active" onclick="changeRoom('general', this)"># general</div>
        <div class="room" onclick="changeRoom('gaming', this)"># gaming</div>
        <div class="room" onclick="changeRoom('random', this)"># random</div>
    </div>

    <!-- CHAT -->
    <div class="chat-container main">

        <h1 id="roomTitle"># general</h1>

        <div id="messages"></div>

        <input type="text" id="username" disabled>

        <input type="text" id="message" placeholder="Mesaj">

        <button onclick="sendMessage()">Trimite</button>

    </div>

</div>

<script>
if (!localStorage.username) {
    window.location.href = "/welcome.html";
}
</script>

<script src="static/app.js"></script>

</body>
</html>
