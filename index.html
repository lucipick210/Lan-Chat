<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Chat App</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            ⚡ LAN CHAT
        </div>
        <div class="nav-right">
            <span id="userLabel">
                Utilizator
            </span>

            <button onclick="logout()">
                Logout
            </button>
        </div>

    </nav>
    <div class="layout">
    <div class="sidebar">
        <h3>Camere</h3>
            <div class="room active">
                # general
            </div>
            <div class="room">
                # gaming
            </div>
            <div class="room">
                # random
            </div>
    </div>
    <div class="chat-container main">
        <h1>LAN CHAT</h1>
        <div id="messages"></div>
        <input
        type="text"
        id="username"
        disabled>
        <input
        type="text"
        id="message"
        placeholder="Mesaj">
        <button onclick="sendMessage()">
            Trimite
        </button>
    </div>
</div>

<script>

if(!localStorage.username){

    window.location.href ="/login.html"}

</script>

<script src="static/app.js"></script>

</body>
</html>
